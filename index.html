<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sampah Liar Makassar</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #10b981;
            --primary-light: #d1fae5;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --success: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            --glass-blur: blur(20px);
            --text-white: rgba(255, 255, 255, 0.95);
            --text-muted: rgba(255, 255, 255, 0.5);
            --item-hover: rgba(255, 255, 255, 0.08);
            --item-active: rgba(255, 255, 255, 0.15);
            --divider: rgba(255, 255, 255, 0.1);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --sidebar-width: 300px;
            --sidebar-collapsed: 72px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #0f1523;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* MAP */
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        /* SIDEBAR */
        #sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--glass-shadow);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width var(--transition);
        }

        #sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        /* TOGGLE BTN */
        #toggle-btn {
            position: absolute;
            top: 50%;
            right: -16px;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            box-shadow: var(--glass-shadow);
            transition: background 0.2s;
        }

        #toggle-btn:hover {
            background: var(--item-active);
        }

        #toggle-btn svg {
            transition: transform var(--transition);
            color: white;
        }

        #sidebar.collapsed #toggle-btn svg {
            transform: rotate(180deg);
        }

        /* TRAFFIC LIGHTS */
        #traffic-lights {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 18px 20px 0;
            flex-shrink: 0;
        }

        .tl {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: default;
        }

        .tl-red {
            background: #ff5f57;
        }

        .tl-yellow {
            background: #febc2e;
        }

        .tl-green {
            background: #28c840;
            cursor: pointer;
        }

        /* BRAND */
        #brand {
            padding: 12px 16px 16px;
            border-bottom: 1px solid var(--divider);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 70px;
        }

        #brand-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #047857);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
        }

        #brand-text {
            overflow: hidden;
            transition: opacity var(--transition);
            white-space: nowrap;
        }

        #sidebar.collapsed #brand-text {
            opacity: 0;
            pointer-events: none;
        }

        #brand-text h1 {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-white);
            letter-spacing: -0.3px;
        }

        #brand-text p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* STATS */
        #stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 12px 14px;
            gap: 8px;
            border-bottom: 1px solid var(--divider);
            flex-shrink: 0;
            transition: opacity var(--transition);
        }

        #sidebar.collapsed #stats-row {
            opacity: 0;
            pointer-events: none;
        }

        .stat {
            background: var(--item-active);
            border: 1px solid var(--glass-border);
            padding: 10px 6px;
            border-radius: var(--radius-md);
            text-align: center;
        }

        .stat-num {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-white);
            display: block;
        }

        #stat-parah {
            color: var(--danger);
        }

        #stat-selesai {
            color: var(--success);
        }

        .stat-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            font-weight: 600;
            margin-top: 2px;
        }

        /* SECTION LABEL */
        .section-label {
            padding: 14px 16px 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--divider);
        }

        #sidebar.collapsed .section-label {
            padding: 10px 0;
            justify-content: center;
        }

        #sidebar.collapsed .section-label span {
            display: none;
        }

        #sidebar.collapsed .section-label::after {
            display: none;
        }

        /* FILTERS */
        #filters {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #filters::-webkit-scrollbar {
            width: 0;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            user-select: none;
            white-space: nowrap;
            opacity: 0.45;
            filter: grayscale(60%);
        }

        .filter-item:hover {
            background: var(--item-hover);
            opacity: 0.75;
        }

        .filter-item.active {
            opacity: 1;
            filter: grayscale(0%);
            background: var(--item-active);
            border-color: var(--glass-border);
        }

        .filter-item.active.parah,
        .filter-item.active.belum {
            border-color: rgba(244, 63, 94, 0.35);
            background: rgba(244, 63, 94, 0.12);
        }

        .filter-item.active.sedang,
        .filter-item.active.proses {
            border-color: rgba(245, 158, 11, 0.35);
            background: rgba(245, 158, 11, 0.12);
        }

        .filter-item.active.ringan,
        .filter-item.active.selesai {
            border-color: rgba(16, 185, 129, 0.35);
            background: rgba(16, 185, 129, 0.12);
        }

        .fi-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }

        .fi-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-white);
            flex: 1;
            transition: opacity var(--transition);
        }

        #sidebar.collapsed .fi-label {
            opacity: 0;
        }

        .fi-count {
            font-size: 11px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 20px;
            transition: opacity var(--transition);
        }

        #sidebar.collapsed .fi-count {
            opacity: 0;
        }

        .filter-item.active .fi-count {
            color: var(--text-white);
        }

        .filter-section-gap {
            height: 6px;
            flex-shrink: 0;
        }

        /* DIVIDER */
        .sidebar-divider {
            height: 1px;
            background: var(--divider);
            margin: 6px 14px;
            flex-shrink: 0;
        }

        /* RESET */
        #btn-reset {
            margin: 6px 10px 16px;
            padding: 11px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            background: var(--item-hover);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
        }

        #btn-reset:hover {
            background: var(--item-active);
            color: var(--text-white);
        }

        #sidebar.collapsed #btn-reset span {
            display: none;
        }

        /* BADGE */
        #badge {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-white);
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot-live {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(244, 63, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0);
            }
        }

        /* LAYER TOGGLE */
        #layer-toggle {
            position: absolute;
            bottom: 80px;
            right: 24px;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-white);
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            outline: none;
        }

        #layer-toggle:hover {
            background: var(--item-active);
            transform: translateY(-1px);
        }

        /* LEGEND */
        .leaflet-legend {
            background: var(--glass-bg) !important;
            backdrop-filter: var(--glass-blur) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--glass-shadow) !important;
            padding: 12px 16px !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
        }

        .legend-title {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-white);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* LOADING */
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            background: rgba(15, 21, 35, 0.65);
            backdrop-filter: blur(8px);
            transition: opacity 0.3s ease;
        }

        .loading-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 28px 36px;
            border-radius: var(--radius-xl);
            box-shadow: var(--glass-shadow);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(16, 185, 129, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-card p {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* LEAFLET OVERRIDES */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: none !important;
            margin-right: 24px !important;
            margin-bottom: 24px !important;
        }

        .leaflet-control-zoom a {
            background: var(--glass-bg) !important;
            backdrop-filter: var(--glass-blur) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
            font-weight: 700 !important;
            width: 36px !important;
            height: 36px !important;
            line-height: 34px !important;
        }

        .leaflet-control-zoom a:first-child {
            border-radius: 12px 12px 0 0 !important;
            border-bottom: none !important;
        }

        .leaflet-control-zoom a:last-child {
            border-radius: 0 0 12px 12px !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--item-active) !important;
        }

        .leaflet-popup-content-wrapper {
            background: rgba(15, 21, 35, 0.88) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 16px !important;
            box-shadow: var(--glass-shadow) !important;
            color: white !important;
        }

        .leaflet-popup-tip {
            background: rgba(15, 21, 35, 0.88) !important;
        }

        .leaflet-popup-content {
            margin: 14px 18px !important;
            line-height: 1.6 !important;
        }

        .leaflet-attribution-flag {
            display: none !important;
        }

        .leaflet-control-attribution {
            background: rgba(0, 0, 0, 0.3) !important;
            color: rgba(255, 255, 255, 0.3) !important;
            border-radius: 8px !important;
            font-size: 10px !important;
        }

        .custom-popup .popup-title {
            font-size: 15px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
        }

        .custom-popup .popup-row {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 5px;
            display: flex;
            gap: 6px;
        }

        .popup-badge-container {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div id="app">

        <div id="map"></div>

        <div id="loading">
            <div class="loading-card">
                <div class="spinner"></div>
                <p>Menyelaraskan data...</p>
            </div>
        </div>

        <div id="badge">
            <div class="dot-live"></div>
            <span id="badge-text">Memuat...</span>
        </div>

        <button id="layer-toggle" onclick="switchLayer()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2" />
                <polyline points="2 17 12 22 22 17" />
                <polyline points="2 12 12 17 22 12" />
            </svg>
            <span id="layer-label">Street Map</span>
        </button>

        <div id="sidebar">

            <div id="toggle-btn" onclick="toggleSidebar()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </div>

            <div id="traffic-lights">
                <div class="tl tl-red"></div>
                <div class="tl tl-yellow"></div>
                <div class="tl tl-green" onclick="toggleSidebar()" title="Collapse"></div>
            </div>

            <div id="brand">
                <div id="brand-avatar">S</div>
                <div id="brand-text">
                    <h1>Sampah Liar</h1>
                    <p>Makassar · 2026</p>
                </div>
            </div>

            <div id="stats-row">
                <div class="stat">
                    <span class="stat-num" id="stat-total">—</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat">
                    <span class="stat-num" id="stat-parah">—</span>
                    <span class="stat-label">Parah</span>
                </div>
                <div class="stat">
                    <span class="stat-num" id="stat-selesai">—</span>
                    <span class="stat-label">Selesai</span>
                </div>
            </div>

            <div id="filters">

                <div class="section-label"><span>Keparahan</span></div>

                <div class="filter-item active parah" data-type="tingkat" data-value="Parah"
                    onclick="toggleFilter(this)">
                    <div class="fi-dot" style="background:var(--danger);color:var(--danger)"></div>
                    <span class="fi-label">Kondisi Parah</span>
                    <span class="fi-count" id="count-parah">0</span>
                </div>
                <div class="filter-item active sedang" data-type="tingkat" data-value="Sedang"
                    onclick="toggleFilter(this)">
                    <div class="fi-dot" style="background:var(--warning);color:var(--warning)"></div>
                    <span class="fi-label">Kondisi Sedang</span>
                    <span class="fi-count" id="count-sedang">0</span>
                </div>
                <div class="filter-item active ringan" data-type="tingkat" data-value="Ringan"
                    onclick="toggleFilter(this)">
                    <div class="fi-dot" style="background:var(--success);color:var(--success)"></div>
                    <span class="fi-label">Kondisi Ringan</span>
                    <span class="fi-count" id="count-ringan">0</span>
                </div>

                <div class="filter-section-gap"></div>
                <div class="section-label"><span>Status</span></div>

                <div class="filter-item active belum" data-type="status" data-value="Belum"
                    onclick="toggleFilter(this)">
                    <div class="fi-dot" style="background:var(--danger);color:var(--danger)"></div>
                    <span class="fi-label">Menunggu</span>
                    <span class="fi-count" id="count-belum">0</span>
                </div>
                <div class="filter-item active proses" data-type="status" data-value="Proses"
                    onclick="toggleFilter(this)">
                    <div class="fi-dot" style="background:var(--warning);color:var(--warning)"></div>
                    <span class="fi-label">Dikerjakan</span>
                    <span class="fi-count" id="count-proses">0</span>
                </div>
                <div class="filter-item active selesai" data-type="status" data-value="Selesai"
                    onclick="toggleFilter(this)">
                    <div class="fi-dot" style="background:var(--success);color:var(--success)"></div>
                    <span class="fi-label">Tuntas</span>
                    <span class="fi-count" id="count-selesai">0</span>
                </div>

            </div>

            <div class="sidebar-divider"></div>

            <button id="btn-reset" onclick="resetFilter()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
                <span>Reset Filter</span>
            </button>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ── CONSTANTS ──
        const MAKASSAR_CENTER = [-5.1477, 119.4327];
        const DEFAULT_ZOOM = 13;

        // ── MAP ──
        const map = L.map('map', { zoomControl: false }).setView(MAKASSAR_CENTER, DEFAULT_ZOOM);

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© ArcGIS' });
        const streetLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', { attribution: '© CartoDB' });

        let currentLayer = 'satellite';
        satelliteLayer.addTo(map);

        // FIX: label menunjukkan layer yang akan di-switch KE
        function switchLayer() {
            const label = document.getElementById('layer-label');
            if (currentLayer === 'satellite') {
                map.removeLayer(satelliteLayer);
                streetLayer.addTo(map);
                currentLayer = 'street';
                label.textContent = 'Satellite';
            } else {
                map.removeLayer(streetLayer);
                satelliteLayer.addTo(map);
                currentLayer = 'satellite';
                label.textContent = 'Street Map';
            }
        }

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // LEGEND
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const d = L.DomUtil.create('div', 'leaflet-legend');
            d.innerHTML = `
            <div class="legend-title">Keparahan</div>
            <div class="legend-row"><div class="legend-dot" style="background:#f43f5e"></div>Parah</div>
            <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div>Sedang</div>
            <div class="legend-row"><div class="legend-dot" style="background:#10b981"></div>Ringan</div>
        `;
            return d;
        };
        legend.addTo(map);

        // SIDEBAR TOGGLE
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // HELPERS
        function getWarna(t) {
            if (t === 'Parah') return '#f43f5e';
            if (t === 'Sedang') return '#f59e0b';
            if (t === 'Ringan') return '#10b981';
            return '#94a3b8';
        }

        function parseCSVRow(row) {
            const res = []; let cur = '', inQ = false;
            for (let i = 0; i < row.length; i++) {
                const c = row[i];
                if (c === '"') { inQ = !inQ; }
                else if (c === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
                else { cur += c; }
            }
            res.push(cur.trim());
            return res;
        }

        function statusBadge(s) {
            const colors = { Belum: '#f43f5e', Proses: '#f59e0b', Selesai: '#10b981' };
            const bg = { Belum: 'rgba(244,63,94,0.15)', Proses: 'rgba(245,158,11,0.15)', Selesai: 'rgba(16,185,129,0.15)' };
            return `<span style="background:${bg[s] || 'rgba(255,255,255,0.1)'};color:${colors[s] || '#fff'};font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px">${s}</span>`;
        }

        // FILTER
        let semuaMarker = [];
        let filterAktif = { tingkat: ['Parah', 'Sedang', 'Ringan'], status: ['Belum', 'Proses', 'Selesai'] };

        function toggleFilter(el) {
            const type = el.dataset.type;
            const value = el.dataset.value;
            const arr = filterAktif[type];
            const idx = arr.indexOf(value);
            if (idx > -1) {
                if (arr.length === 1) return;
                arr.splice(idx, 1);
                el.classList.remove('active');
            } else {
                arr.push(value);
                el.classList.add('active');
            }
            applyFilter();
        }

        function resetFilter() {
            filterAktif = { tingkat: ['Parah', 'Sedang', 'Ringan'], status: ['Belum', 'Proses', 'Selesai'] };
            document.querySelectorAll('.filter-item').forEach(el => el.classList.add('active'));
            applyFilter();
        }

        function applyFilter() {
            let visible = 0;
            semuaMarker.forEach(item => {
                const show = filterAktif.tingkat.includes(item.tingkat) &&
                    filterAktif.status.includes(item.status);
                if (show) { if (!map.hasLayer(item.marker)) item.marker.addTo(map); visible++; }
                else { map.removeLayer(item.marker); }
            });
            document.getElementById('badge-text').innerText = `${visible} Titik Aktif`;
        }

        // FETCH
        const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5p7OM6dkZOMm02jolXCnpsUb4F5HGJVnBL1KrSA9Q0oq-deqEckYkkeE6dDWcR1VUQL-DjAyeDP9r/pub?output=csv&t=" + new Date().getTime();

        fetch(SHEETS_URL)
            .then(r => r.text())
            .then(csv => {
                const loading = document.getElementById('loading');
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 300);

                const baris = csv.split('\n');
                const counts = { Parah: 0, Sedang: 0, Ringan: 0, Belum: 0, Proses: 0, Selesai: 0 };

                for (let i = 1; i < baris.length; i++) {
                    const k = parseCSVRow(baris[i]);
                    if (k.length < 8) continue;

                    const nama = k[0];
                    const lat = parseFloat(k[2]);
                    const lng = parseFloat(k[3]);
                    const tingkat = k[4];
                    const deskripsi = k[5];
                    const tanggal = k[6];
                    const status = k[7].replace(/\r/g, '').trim(); // FIX: strip \r

                    if (isNaN(lat) || isNaN(lng)) continue;

                    if (counts[tingkat] !== undefined) counts[tingkat]++;
                    if (counts[status] !== undefined) counts[status]++;

                    const marker = L.circleMarker([lat, lng], {
                        radius: 7,
                        fillColor: getWarna(tingkat),
                        color: 'rgba(255,255,255,0.5)',
                        weight: 2,
                        fillOpacity: 1
                    });

                    marker.bindPopup(`
                    <div class="custom-popup">
                        <div class="popup-title">${nama}</div>
                        <div class="popup-row"><span>📍</span>${tingkat}</div>
                        <div class="popup-row"><span>📝</span>${deskripsi}</div>
                        <div class="popup-row"><span>🗓️</span>${tanggal}</div>
                        <div class="popup-badge-container">${statusBadge(status)}</div>
                    </div>
                `);

                    marker.addTo(map);
                    semuaMarker.push({ marker, tingkat, status });
                }

                document.getElementById('count-parah').innerText = counts.Parah;
                document.getElementById('count-sedang').innerText = counts.Sedang;
                document.getElementById('count-ringan').innerText = counts.Ringan;
                document.getElementById('count-belum').innerText = counts.Belum;
                document.getElementById('count-proses').innerText = counts.Proses;
                document.getElementById('count-selesai').innerText = counts.Selesai;

                document.getElementById('stat-total').innerText = semuaMarker.length;
                document.getElementById('stat-parah').innerText = counts.Parah;
                document.getElementById('stat-selesai').innerText = counts.Selesai;
                document.getElementById('badge-text').innerText = `${semuaMarker.length} Titik Aktif`;
            })
            .catch(err => {
                const card = document.querySelector('.loading-card');
                card.innerHTML = '<div style="font-size:24px;margin-bottom:10px">⚠️</div><p style="color:#f43f5e;font-weight:600">Gagal memuat data</p>';
                console.error(err);
            });
    </script>
</body>

</html>
