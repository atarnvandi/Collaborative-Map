<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collaborative Map</title>

    <!-- Leaflet CSS — tampilan peta -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- Kotak tempat peta ditampilkan -->
    <div id="map"></div>

    <!-- Leaflet JS — mesin petanya -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Buat peta, fokus ke Indonesia
        const map = L.map('map').setView([-2.5, 118.0], 5);

        // Pasang basemap ESRI
        L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
            {
                attribution: 'Collaborative Map © Esri'
            }
        ).addTo(map);
    </script>

</body>

</html>
